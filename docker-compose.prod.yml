services:
  frontend:
    image: cr.yandex/${YC_REGISTRY_ID}/quokkaq-frontend:${VERSION}
    container_name: quokkaq-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quokkaq-frontend.rule=Host(`app.quokkaq.v-b.tech`)"
      - "traefik.http.routers.quokkaq-frontend.entrypoints=websecure"
      - "traefik.http.routers.quokkaq-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.quokkaq-frontend.loadbalancer.server.port=3000"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
